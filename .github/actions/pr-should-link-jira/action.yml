---

name: pr-should-link-jira
description: >
    On -rhel branches, require the PR description to link a Jira
    issue (Fixes: https://issues.redhat.com/browse/...), unless the
    'No Jira Link' label is set.

inputs:
    pr-body:
        description: Body of the pull request
        required: true
    base-ref:
        description: Name of the PR base branch (e.g. v4.9-rhel)
        required: true
    override:
        description: '"true" if the override label is set, else "false"'
        required: true

runs:
    using: composite
    steps:
        - shell: bash
          env:
              PR_BODY: ${{ inputs.pr-body }}
              DEST_BRANCH: ${{ inputs.base-ref }}
              OVERRIDE: ${{ inputs.override }}
          run: ${{ github.action_path }}/pr-should-link-jira
