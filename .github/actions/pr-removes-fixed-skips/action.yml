---

name: pr-removes-fixed-skips
description: >
    If a PR claims to fix issue #N, fail when any Skip / FIXME still
    mentions #N in test/, cmd/, libpod/ or pkg/.

inputs:
    pr-body:
        description: Body of the pull request
        required: true
    base-sha:
        description: SHA of the PR base commit
        required: true
    head-sha:
        description: SHA of the PR head commit
        required: true

runs:
    using: composite
    steps:
        - shell: bash
          env:
              PR_BODY: ${{ inputs.pr-body }}
              BASE_SHA: ${{ inputs.base-sha }}
              HEAD_SHA: ${{ inputs.head-sha }}
          run: ${{ github.action_path }}/pr-removes-fixed-skips
